<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>Caixa</title><link rel="stylesheet" href="style.css"></head><body><div class="header"><h1>💵 Caixa</h1></div><div class="container"><div id="menu"></div><div class="card"><h2>Movimento de caixa</h2><div class="form"><input id="tipo" placeholder="Tipo: Abertura, Sangria, Suprimento, Fechamento"><input id="operador" placeholder="Operador"><input id="valor" type="number" placeholder="Valor"><input id="obs" placeholder="Observação"></div><button onclick="salvar()">Salvar movimento</button></div><div class="tablebox"><table><thead><tr><th>Data</th><th>Tipo</th><th>Operador</th><th>Valor</th><th>Obs</th></tr></thead><tbody id="body"></tbody></table></div></div><script src="app.js"></script><script>document.getElementById('menu').innerHTML=menu();function salvar(){let c=get('caixa');c.push({data:new Date().toISOString(),tipo:tipo.value,operador:operador.value,valor:Number(valor.value||0),obs:obs.value});set('caixa',c);render()}function render(){body.innerHTML=get('caixa').slice().reverse().map(x=>'<tr><td>'+new Date(x.data).toLocaleString('pt-BR')+'</td><td>'+x.tipo+'</td><td>'+x.operador+'</td><td>'+money(x.valor)+'</td><td>'+x.obs+'</td></tr>').join('')}render()</script></body></html>
