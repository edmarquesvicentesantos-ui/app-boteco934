<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>Clientes</title><link rel="stylesheet" href="style.css"></head><body><div class="header"><h1>👥 Clientes / Pendura</h1></div><div class="container"><div id="menu"></div><div class="card"><h2>Cadastrar cliente</h2><div class="form"><input id="nome" placeholder="Nome"><input id="zap" placeholder="WhatsApp"><input id="bairro" placeholder="Bairro"><input id="limite" type="number" placeholder="Limite"></div><button onclick="salvar()">Salvar</button></div><div class="tablebox"><table><thead><tr><th>Cliente</th><th>WhatsApp</th><th>Bairro</th><th>Limite</th><th>Pendura</th><th>Cobrar</th></tr></thead><tbody id="body"></tbody></table></div></div><script src="app.js"></script><script>menu.innerHTML=renderMenu();function salvar(){let cs=get('clientes');cs.push({id:uid(),nome:nome.value,zap:zap.value,bairro:bairro.value,limite:Number(limite.value||0),pendura:0});set('clientes',cs);location.reload()}function render(){body.innerHTML=clientes().map(c=>{let msg='BOTECO 934\nPendência: '+money(c.pendura);return '<tr><td>'+c.nome+'</td><td>'+c.zap+'</td><td>'+c.bairro+'</td><td>'+money(c.limite)+'</td><td>'+money(c.pendura)+'</td><td>'+(c.pendura>0?'<a class=btn target=_blank href="'+zapLink(c.zap,msg)+'">WhatsApp</a>':'-')+'</td></tr>'}).join('')}render();</script></body></html>
