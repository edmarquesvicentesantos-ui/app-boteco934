<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>Códigos</title><link rel="stylesheet" href="style.css"></head><body><div class="header"><h1>🏷️ Código de Barras / Etiquetas</h1></div><div class="container"><div id="menu"></div><div class="card"><h2>Gerar etiqueta interna</h2><div class="form"><input id="produto" placeholder="Produto"><input id="preco" type="number" placeholder="Preço"><input id="local" placeholder="Gôndola"><input id="codigo" readonly placeholder="Código"></div><button onclick="gerar()">Gerar</button><button onclick="window.print()">Imprimir</button></div><div id="etiqueta" class="receipt">Etiqueta aparecerá aqui.</div></div><script src="app.js"></script><script>document.getElementById('menu').innerHTML=menu();function gerar(){let l=get('etiquetas');let cod='934'+String(l.length+1).padStart(6,'0');codigo.value=cod;l.push({produto:produto.value,preco:Number(preco.value||0),local:local.value,codigo:cod});set('etiquetas',l);etiqueta.innerHTML='<b>BOTECO 934</b><br>'+produto.value+'<br>'+money(preco.value)+'<br>Cód: '+cod+'<br>Local: '+local.value+'<br>||||||||||||';}</script></body></html>
