<!DOCTYPE html><html lang='pt-br'><head><meta charset='UTF-8'><title>🧾 Comandas</title><link rel='stylesheet' href='style.css'></head><body><div class='header'><h1>🧾 Comandas</h1></div><div class='container'><div id='menu'></div><div class='card'><input placeholder='Cliente'><input placeholder='Mesa'><input placeholder='Itens'><input type='number' placeholder='Total'><select><option>Aberta</option><option>Fechando</option><option>Paga</option></select><button onclick="salvar('comandas')">Salvar</button></div><script>function salvar(k){let o={};document.querySelectorAll('input,select,textarea').forEach(e=>o[e.placeholder||e.id||e.tagName]=e.value);add(k,o);alert('Salvo!')}</script></div><script src='app.js'></script><script>document.getElementById('menu').innerHTML=menu()</script></body></html>
