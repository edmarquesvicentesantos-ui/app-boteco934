<!DOCTYPE html><html lang='pt-br'><head><meta charset='UTF-8'><title>📈 Contas a Receber</title><link rel='stylesheet' href='style.css'></head><body><div class='header'><h1>📈 Contas a Receber</h1></div><div class='container'><div id='menu'></div><div class='card'><input placeholder='Cliente'><input type='number' placeholder='Valor'><input type='date' placeholder='Vencimento'><select><option>Aberta</option><option>Recebida</option></select><button onclick="salvar('contas_receber')">Salvar</button></div><script>function salvar(k){let o={};document.querySelectorAll('input,select,textarea').forEach(e=>o[e.placeholder||e.id||e.tagName]=e.value);add(k,o);alert('Salvo!')}</script></div><script src='app.js'></script><script>document.getElementById('menu').innerHTML=menu()</script></body></html>
