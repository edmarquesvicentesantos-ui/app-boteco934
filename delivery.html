<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>Delivery</title><link rel="stylesheet" href="style.css"></head><body><div class="header"><h1>🚚 Delivery</h1></div><div class="container"><div id="menu"></div><div class="card"><h2>Novo pedido</h2><div class="form"><input id="cliente" placeholder="Cliente"><input id="zap" placeholder="WhatsApp"><input id="endereco" placeholder="Endereço"><input id="itens" placeholder="Itens"><input id="total" type="number" placeholder="Total"><select id="status"><option>Recebido</option><option>Preparando</option><option>Saiu para entrega</option><option>Entregue</option></select></div><button onclick="salvar()">Salvar pedido</button></div><div class="tablebox"><table><thead><tr><th>Cliente</th><th>Itens</th><th>Total</th><th>Status</th><th>WhatsApp</th></tr></thead><tbody id="body"></tbody></table></div></div><script src="app.js"></script><script>document.getElementById('menu').innerHTML=menu();function salvar(){let d=get('delivery');d.push({cliente:cliente.value,zap:zap.value,endereco:endereco.value,itens:itens.value,total:Number(total.value||0),status:status.value});set('delivery',d);render()}function render(){body.innerHTML=get('delivery').slice().reverse().map(d=>{let msg='BOTECO 934\nPedido: '+d.itens+'\nStatus: '+d.status+'\nTotal: '+money(d.total);return '<tr><td>'+d.cliente+'</td><td>'+d.itens+'</td><td>'+money(d.total)+'</td><td>'+d.status+'</td><td><a class=btn target=_blank href="'+zapLink(d.zap,msg)+'">Enviar</a></td></tr>'}).join('')}render()</script></body></html>
