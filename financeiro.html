<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>Financeiro</title><link rel="stylesheet" href="style.css"></head><body><div class="header"><h1>💰 Financeiro</h1></div><div class="container"><div id="menu"></div><div class="cards" id="cards"></div><div class="tablebox"><table><thead><tr><th>Data</th><th>Cliente</th><th>Pagamento</th><th>Total</th></tr></thead><tbody id="body"></tbody></table></div></div><script src="app.js"></script><script>menu.innerHTML=renderMenu();let vs=get('vendas'),s=t=>vs.filter(v=>v.pag===t).reduce((a,b)=>a+b.total,0);cards.innerHTML=['PIX','Dinheiro','Cartão Crédito','Cartão Débito','Pendura'].map(t=>'<div class=card><h2>'+t+'</h2><p>'+money(s(t))+'</p></div>').join('');body.innerHTML=vs.slice().reverse().map(v=>'<tr><td>'+new Date(v.data).toLocaleString('pt-BR')+'</td><td>'+v.cliente+'</td><td>'+v.pag+'</td><td>'+money(v.total)+'</td></tr>').join('');</script></body></html>
