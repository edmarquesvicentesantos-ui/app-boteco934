<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>Funcionários</title><link rel="stylesheet" href="style.css"></head><body><div class="header"><h1>👔 Funcionários</h1></div><div class="container"><div id="menu"></div><div class="card"><h2>Cadastrar funcionário</h2><div class="form"><input id="nome" placeholder="Nome"><select id="cargo"><option>Admin</option><option>Caixa</option><option>Garçom</option><option>Entregador</option></select><input id="senha" placeholder="Senha/PIN"></div><button onclick="salvar()">Salvar</button></div><div class="tablebox"><table><thead><tr><th>Nome</th><th>Cargo</th><th>Permissão</th></tr></thead><tbody id="body"></tbody></table></div></div><script src="app.js"></script><script>document.getElementById('menu').innerHTML=menu();function perm(c){return c==='Admin'?'Tudo':c==='Caixa'?'Vendas e caixa':c==='Garçom'?'Mesas e pedidos':'Delivery'}function salvar(){let f=get('funcionarios');f.push({nome:nome.value,cargo:cargo.value,senha:senha.value});set('funcionarios',f);render()}function render(){body.innerHTML=get('funcionarios').map(f=>'<tr><td>'+f.nome+'</td><td>'+f.cargo+'</td><td>'+perm(f.cargo)+'</td></tr>').join('')}render()</script></body></html>
