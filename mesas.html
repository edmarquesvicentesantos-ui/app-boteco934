<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>Mesas</title><link rel="stylesheet" href="style.css"></head><body><div class="header"><h1>🪑 Mesas</h1></div><div class="container"><div id="menu"></div><div class="card"><p>Módulo visual de mesas. Próxima evolução: consumo detalhado e divisão de conta.</p></div><div class="grid" id="grid"></div></div><script src="app.js"></script><script>menu.innerHTML=renderMenu();grid.innerHTML=get('mesas').map(m=>'<div class="mesa '+(m.status==='livre'?'livre':'ocupada')+'">Mesa '+m.num+'<br>'+m.status+'</div>').join('')</script></body></html>
