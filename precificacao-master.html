<!DOCTYPE html><html lang='pt-br'><head><meta charset='UTF-8'><title>🏷️ Precificação Master</title><link rel='stylesheet' href='style.css'></head><body><div class='header'><h1>🏷️ Precificação Master</h1></div><div class='container'><div id='menu'></div><div class='card'><input id='cf' type='number' placeholder='Custo fardo'><input id='q' type='number' placeholder='Qtd unidades'><input id='m' type='number' placeholder='Margem %'><button onclick="let cu=Number(cf.value)/Number(q.value||1);let p=cu/(1-Number(m.value||0)/100);res.innerHTML='Custo unidade: '+money(cu)+'<br>Preço sugerido: '+money(p)">Calcular</button><h2 id='res'></h2></div></div><script src='app.js'></script><script>document.getElementById('menu').innerHTML=menu()</script></body></html>
