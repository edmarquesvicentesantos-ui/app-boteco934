<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>Produtos</title><link rel="stylesheet" href="style.css"></head><body><div class="header"><h1>📦 Produtos / Estoque</h1></div><div class="container"><div id="menu"></div><div class="card"><h2>Cadastrar produto</h2><div class="form"><input id="codigo" readonly><input id="nome" placeholder="Nome"><input id="cat" placeholder="Categoria"><input id="qtd" type="number" placeholder="Qtd fardo"><input id="custo" type="number" placeholder="Custo fardo"><input id="nat" type="number" placeholder="Venda natural"><input id="gel" type="number" placeholder="Venda gelada"><input id="estoque" type="number" placeholder="Estoque"><input id="min" type="number" placeholder="Mínimo"><input id="gond" placeholder="Gôndola"></div><button onclick="salvar()">Salvar</button></div><div class="card"><input id="busca" oninput="render()" placeholder="Buscar ou bipar código"></div><div class="tablebox"><table><thead><tr><th>Código</th><th>Produto</th><th>Categoria</th><th>Custo</th><th>Natural</th><th>Gelada</th><th>Estoque</th><th>Status</th></tr></thead><tbody id="body"></tbody></table></div></div><script src="app.js"></script><script>menu.innerHTML=renderMenu();codigo.value=codigoNovo();function salvar(){let ps=get('produtos'),qt=Number(qtd.value||1),cf=Number(custo.value||0);ps.push({id:uid(),codigo:codigo.value,nome:nome.value,cat:cat.value,custo:cf/qt,nat:Number(nat.value||0),gel:Number(gel.value||0),estoque:Number(estoque.value||0),min:Number(min.value||0),gond:gond.value});set('produtos',ps);location.reload()}function render(){let q=(busca.value||'').toLowerCase();body.innerHTML=produtos().filter(p=>p.nome.toLowerCase().includes(q)||String(p.codigo).includes(q)).map(p=>'<tr><td>'+p.codigo+'</td><td>'+p.nome+'</td><td>'+p.cat+'</td><td>'+money(p.custo)+'</td><td>'+money(p.nat)+'</td><td>'+money(p.gel)+'</td><td>'+p.estoque+'</td><td>'+(p.estoque<=p.min?'BAIXO':'OK')+'</td></tr>').join('')}render();</script></body></html>
