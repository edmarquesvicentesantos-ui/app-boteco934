<!DOCTYPE html><html lang='pt-br'><head><meta charset='UTF-8'><title>💳 Recebimentos</title><link rel='stylesheet' href='style.css'></head><body><div class='header'><h1>💳 Recebimentos</h1></div><div class='container'><div id='menu'></div><div class='card'><input placeholder='Descrição'><select><option>PIX</option><option>Dinheiro</option><option>Cartão Crédito</option><option>Cartão Débito</option><option>Pendura</option></select><input type='number' placeholder='Valor'><button onclick="salvar('recebimentos')">Salvar</button></div><script>function salvar(k){let o={};document.querySelectorAll('input,select,textarea').forEach(e=>o[e.placeholder||e.id||e.tagName]=e.value);add(k,o);alert('Salvo!')}</script></div><script src='app.js'></script><script>document.getElementById('menu').innerHTML=menu()</script></body></html>
