<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>Relatórios</title><link rel="stylesheet" href="style.css"></head><body><div class="header"><h1>📈 Relatórios</h1></div><div class="container"><div id="menu"></div><div class="cards"><div class="card"><h2>Vendas</h2><p id="vendas">0</p></div><div class="card"><h2>Caixa</h2><p id="caixa">R$ 0,00</p></div><div class="card"><h2>Delivery</h2><p id="deliv">0 pedidos</p></div><div class="card"><h2>Funcionários</h2><p id="func">0</p></div></div></div><script src="app.js"></script><script>document.getElementById('menu').innerHTML=menu();let cx=get('caixa');document.getElementById('vendas').innerText=get('vendas').length;document.getElementById('caixa').innerText=money(cx.reduce((s,x)=>s+Number(x.valor||0),0));document.getElementById('deliv').innerText=get('delivery').length+' pedidos';document.getElementById('func').innerText=get('funcionarios').length;</script></body></html>
