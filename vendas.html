<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>Vendas</title><link rel="stylesheet" href="style.css"></head><body><div class="header"><h1>🍺 Venda</h1></div><div class="container"><div id="menu"></div><div class="card"><div class="form"><select id="cliente"></select><select id="produto"></select><select id="tipo"><option value="gel">Gelada</option><option value="nat">Natural</option></select><input id="qtd" type="number" value="1"><select id="pag"><option>PIX</option><option>Dinheiro</option><option>Cartão Crédito</option><option>Cartão Débito</option><option>Pendura</option></select></div><button onclick="vender()">Finalizar</button></div><div class="card"><h2>Recibo</h2><div id="recibo" class="receipt">Recibo aparecerá aqui</div><br><button onclick="window.print()">Imprimir</button><a id="zapRecibo" class="btn" target="_blank">WhatsApp</a></div></div><script src="app.js"></script><script>menu.innerHTML=renderMenu();cliente.innerHTML='<option value="">Avulso</option>'+clientes().map(c=>'<option value='+c.id+'>'+c.nome+'</option>').join('');produto.innerHTML=produtos().map(p=>'<option value='+p.id+'>'+p.nome+' - '+p.codigo+'</option>').join('');function vender(){let ps=get('produtos'),p=ps.find(x=>x.id===produto.value),cs=get('clientes'),c=cs.find(x=>x.id===cliente.value),q=Number(qtd.value||1),pre=tipo.value==='gel'?p.gel:p.nat,total=pre*q,lucro=(pre-p.custo)*q,vs=get('vendas');vs.push({id:uid(),data:new Date().toISOString(),cliente:c?c.nome:'Avulso',pag:pag.value,total,lucro,mesa:''});set('vendas',vs);baixar(p.id,q);if(pag.value==='Pendura'&&c){c.pendura+=total;set('clientes',cs)}recibo.innerHTML='<b>BOTECO 934</b><br>'+p.nome+'<br>Total: '+money(total);if(c)zapRecibo.href=zapLink(c.zap,'BOTECO 934\nTotal: '+money(total));alert('Venda salva!')}</script></body></html>
