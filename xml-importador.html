<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>XML</title><link rel="stylesheet" href="style.css"></head><body><div class="header"><h1>📄 Importador XML NF-e</h1></div><div class="container"><div id="menu"></div><div class="card"><h2>Colar XML</h2><textarea id="xmltxt" rows="10" placeholder="Cole aqui o XML da NF-e"></textarea><button onclick="ler()">Ler XML</button></div><div class="card"><h2>Resultado</h2><div id="resultado">Aguardando XML.</div></div></div><script src="app.js"></script><script>document.getElementById('menu').innerHTML=menu();function ler(){let txt=xmltxt.value;let nomes=[...txt.matchAll(/<xProd>(.*?)<\/xProd>/g)].map(x=>x[1]);let qtd=[...txt.matchAll(/<qCom>(.*?)<\/qCom>/g)].map(x=>x[1]);let val=[...txt.matchAll(/<vProd>(.*?)<\/vProd>/g)].map(x=>x[1]);resultado.innerHTML=nomes.length?'<table><tr><th>Produto</th><th>Qtd</th><th>Valor</th></tr>'+nomes.map((n,i)=>'<tr><td>'+n+'</td><td>'+(qtd[i]||'')+'</td><td>R$ '+(val[i]||'')+'</td></tr>').join('')+'</table>':'Nenhum produto encontrado no XML colado.'}</script></body></html>
